
services:
  colepago:
    build: ./colepago
    ports:
      - "8000:8000"
    volumes:
      - ./colepago:/app
    restart: unless-stopped
  colepago-parents-app:
    build: ./colepago-parents-app
    ports:
      - "8080:80"
    restart: unless-stopped
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: colepago
      POSTGRES_USER: colepago
      POSTGRES_PASSWORD: colepago_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
