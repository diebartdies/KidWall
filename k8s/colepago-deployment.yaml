apiVersion: apps/v1
kind: Deployment
metadata:
  name: colepago-deployment
  labels:
    app: colepago
spec:
  replicas: 1
  selector:
    matchLabels:
      app: colepago
  template:
    metadata:
      labels:
        app: colepago
    spec:
      containers:
      - name: colepago
        image: colepago:latest
        ports:
        - containerPort: 8010
        livenessProbe:
          httpGet:
            path: /health
            port: 8010
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8010
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: colepago-service
spec:
  selector:
    app: colepago
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8010
  type: ClusterIP
