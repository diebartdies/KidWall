<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="ColePago logo">
  <defs>
    <linearGradient id="pigGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE040"/>
      <stop offset="100%" stop-color="#D4A000"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE878"/>
      <stop offset="100%" stop-color="#CC9900"/>
    </linearGradient>
    <linearGradient id="handGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D8D4D4"/>
      <stop offset="100%" stop-color="#A89E9E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="#FAFAF6"/>

  <!-- ===== PARENT HAND (top — fingers up, palm down toward pig) ===== -->
  <rect x="87"  y="6"  width="12" height="26" rx="6" fill="url(#handGrad)" stroke="#888" stroke-width="1"/>
  <rect x="103" y="3"  width="12" height="26" rx="6" fill="url(#handGrad)" stroke="#888" stroke-width="1"/>
  <rect x="119" y="3"  width="12" height="26" rx="6" fill="url(#handGrad)" stroke="#888" stroke-width="1"/>
  <rect x="135" y="6"  width="12" height="26" rx="6" fill="url(#handGrad)" stroke="#888" stroke-width="1"/>
  <rect x="80"  y="22" width="76" height="30" rx="12" fill="url(#handGrad)" stroke="#888" stroke-width="1.5"/>
  <rect x="64"  y="26" width="22" height="16" rx="8" fill="url(#handGrad)" stroke="#888" stroke-width="1"/>

  <!-- Coin dropping from hand -->
  <circle cx="128" cy="68" r="11" fill="url(#coinGrad)" stroke="#B8860B" stroke-width="2"/>
  <text x="128" y="72" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="7" font-weight="900" fill="#6B4400">VC</text>

  <!-- ===== PIG (schematic flat, dollar-gold) ===== -->
  <!-- Coin slot on top -->
  <rect x="120" y="83" width="16" height="7" rx="3" fill="#7A5500"/>

  <!-- Body -->
  <ellipse cx="128" cy="140" rx="68" ry="53" fill="url(#pigGold)" stroke="#B8860B" stroke-width="3"/>

  <!-- Ear (schematic triangle) -->
  <polygon points="165,88 182,76 186,96" fill="#D4A000" stroke="#B8860B" stroke-width="2"/>

  <!-- Eye -->
  <circle cx="166" cy="118" r="6" fill="#fff" stroke="#B8860B" stroke-width="1.5"/>
  <circle cx="166" cy="118" r="3" fill="#2a1800"/>

  <!-- Snout -->
  <ellipse cx="189" cy="146" rx="18" ry="14" fill="#D4A000" stroke="#B8860B" stroke-width="2"/>
  <circle cx="184" cy="143" r="3.5" fill="#7A5500"/>
  <circle cx="194" cy="143" r="3.5" fill="#7A5500"/>

  <!-- Tail -->
  <path d="M60 138 Q48 128 52 116 Q56 104 66 110 Q72 116 68 126" fill="none" stroke="#B8860B" stroke-width="3" stroke-linecap="round"/>

  <!-- Bucket slots inside pig -->
  <rect x="96"  y="124" width="15" height="22" rx="3" fill="#fff" opacity="0.75"/>
  <rect x="117" y="124" width="15" height="22" rx="3" fill="#fff" opacity="0.75"/>
  <rect x="138" y="124" width="15" height="22" rx="3" fill="#fff" opacity="0.75"/>

  <!-- Legs -->
  <rect x="90"  y="185" width="18" height="14" rx="5" fill="#D4A000" stroke="#B8860B" stroke-width="2"/>
  <rect x="114" y="185" width="18" height="14" rx="5" fill="#D4A000" stroke="#B8860B" stroke-width="2"/>
  <rect x="138" y="185" width="18" height="14" rx="5" fill="#D4A000" stroke="#B8860B" stroke-width="2"/>

  <!-- Coin exiting pig -->
  <circle cx="128" cy="203" r="11" fill="url(#coinGrad)" stroke="#B8860B" stroke-width="2"/>
  <text x="128" y="207" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="7" font-weight="900" fill="#6B4400">VC</text>

  <!-- ===== CHILD HAND (bottom — palm up, fingers down) ===== -->
  <rect x="80"  y="204" width="76" height="30" rx="12" fill="url(#handGrad)" stroke="#888" stroke-width="1.5"/>
  <rect x="64"  y="214" width="22" height="16" rx="8" fill="url(#handGrad)" stroke="#888" stroke-width="1"/>
  <rect x="87"  y="224" width="12" height="26" rx="6" fill="url(#handGrad)" stroke="#888" stroke-width="1"/>
  <rect x="103" y="227" width="12" height="26" rx="6" fill="url(#handGrad)" stroke="#888" stroke-width="1"/>
  <rect x="119" y="227" width="12" height="26" rx="6" fill="url(#handGrad)" stroke="#888" stroke-width="1"/>
  <rect x="135" y="224" width="12" height="26" rx="6" fill="url(#handGrad)" stroke="#888" stroke-width="1"/>
</svg>
