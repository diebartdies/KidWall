
name: Build Sync and Deploy All
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

        run: |
  build-sync-deploy:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Build APKs
          cd colepago-parents-app
          chmod +x build_both_apks.ps1
          pwsh ./build_both_apks.ps1
          cd ..

      - name: Commit and push all branches
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Automated sync and deployment [CI]" || echo "No changes to commit"
          git push -f origin main
          git checkout colepago
          git push -f origin colepago
          git checkout colepago-parents-app
          git push -f origin colepago-parents-app
          git checkout colepagokidwall
          git push -f origin colepagokidwall
          git checkout main

      - name: Build Docker image for colepago
        run: |
          cd colepago
          docker build -t colepago:latest .
          cd ..

      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform apply -auto-approve
          cd ..
