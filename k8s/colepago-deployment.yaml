apiVersion: apps/v1
kind: Deployment
metadata:
  name: colepago-deployment
  labels:
    app: colepago
spec:
  replicas: 1
  selector:
    matchLabels:
      app: colepago
  template:
    metadata:
      labels:
        app: colepago
    spec:
      containers:
      - name: colepago
        image: colepago:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: colepago-service
spec:
  selector:
    app: colepago
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
