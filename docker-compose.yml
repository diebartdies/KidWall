services:
  db:
    image: postgres:15
    container_name: kidwall_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kidwall_network

  colepago:
    build: ./colepago
    container_name: kidwall_colepago
    ports:
      - "8000:8000"
    volumes:
      - ./colepago/api:/app/api
      - ./colepago/alembic:/app/alembic
      - ./colepago/alembic.ini:/app/alembic.ini
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    networks:
      - kidwall_network

  colepago-parents-app:
    build: ./colepago-parents-app
    container_name: kidwall_parents_app
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - colepago
    networks:
      - kidwall_network

volumes:
  pgdata:
    driver: local

networks:
  kidwall_network:
    driver: bridge
