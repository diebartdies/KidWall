apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: your-email@drsrv.net.ar
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kids-tls
  namespace: default
spec:
  secretName: kids-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: kids.drsrv.net.ar
  dnsNames:
    - kids.drsrv.net.ar
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: parents-tls
  namespace: default
spec:
  secretName: parents-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: parents.drsrv.net.ar
  dnsNames:
    - parents.drsrv.net.ar
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: merchants-tls
  namespace: default
spec:
  secretName: merchants-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: merchants.drsrv.net.ar
  dnsNames:
    - merchants.drsrv.net.ar
