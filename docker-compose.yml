version: '3.8'
services:
  api:
    build: .
    container_name: colepago-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app
  db:
    image: postgres:15
    container_name: colepago-db
    environment:
      POSTGRES_DB: colepago
      POSTGRES_USER: colepago
      POSTGRES_PASSWORD: colepago_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
