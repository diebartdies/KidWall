apiVersion: apps/v1
kind: Deployment
metadata:
  name: colepago-backend
spec:
  replicas: 2  # Two backend pods for high availability
  selector:
    matchLabels:
      app: colepago-backend
  template:
    metadata:
      labels:
        app: colepago-backend
    spec:
      containers:
      - name: backend
        image: your-backend-image:latest  # Replace with your image
        ports:
        - containerPort: 8010             # Backend port
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health               # FastAPI health endpoint
            port: 8010
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8010
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: ENVIRONMENT
          value: "production"
        # Add more env vars, volumes, or Puppet integration as needed
---
apiVersion: v1
kind: Service
metadata:
  name: colepago-backend
spec:
  selector:
    app: colepago-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8010
  type: ClusterIP
